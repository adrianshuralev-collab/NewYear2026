<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year 2026 Party</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
        }
        /* Media Queries for desktop layout */
        @media (min-width: 768px) {
            .container {
                width: 1000px;
            }
        }
        @media (min-width: 992px) {
            .container {
                width: 1200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the New Year 2026 Celebration!</h1>
        <p>Join us for an unforgettable night filled with fun and festivities.</p>
    </div>
</body>
</html>
