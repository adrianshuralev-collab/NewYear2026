<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year 2026 Party | Desktop Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffcc33;
            --dark-bg: #0a0e14;
            --accent-red: #e63946;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top, #1a2a6c, #b21f1f, var(--dark-bg));
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Основной контейнер для ПК */
        .container {
            width: 90%;
            max-width: 1200px;
            padding: 60px;
            background: var(--glass);
            backdrop-filter: blur(15px); /* Эффект матового стекла */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 4rem; /* Крупный заголовок для ПК */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary-gold), #fff, var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.5rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            max-width: 700px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--dark-bg);
            background: var(--primary-gold);
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255, 204, 51, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cta-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 204, 51, 0.6);
            background: #fff;
        }

        /* Декоративные элементы (только для больших экранов) */
        .decor {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            border-radius: 50%;
        }

        .ball-1 { width: 300px; height: 300px; background: var(--accent-red); top: 10%; left: 10%; }
        .ball-2 { width: 400px; height: 400px; background: #1a2a6c; bottom: 10%; right: 10%; }

        /* Адаптация под очень широкие экраны */
        @media (min-width: 1400px) {
            .container {
                max-width: 1300px;
                padding: 80px;
            }
            h1 { font-size: 5rem; }
        }
    </style>
</head>
<body>
    <div class="decor ball-1"></div>
    <div class="decor ball-2"></div>

    <div class="container">
        <h1>2026</h1>
        <p>Присоединяйтесь к незабываемой ночи, полной драйва, огней и праздничного безумия. Встретим будущее вместе!</p>
        <a href="#" class="cta-button">Забронировать место</a>
    </div>
</body>
</html>
